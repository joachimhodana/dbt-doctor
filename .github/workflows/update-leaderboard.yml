name: Update Leaderboard

on:
  push:
    branches: [main]
    paths:
      - benchmarks/**
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Update leaderboard section in README
        run: pnpm leaderboard:update

      - name: Format
        run: pnpm format

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- packages/dbt-doctor/README.md packages/website/public/leaderboard.json; then
            echo "No leaderboard changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/dbt-doctor/README.md packages/website/public/leaderboard.json
          git commit -m "chore: sync leaderboard from benchmarks/"
          git push
